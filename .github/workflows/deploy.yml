name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout portfolio
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install portfolio dependencies
        run: npm ci

      - name: Build portfolio
        run: npm run build

      - name: Checkout ai-fitness
        uses: actions/checkout@v4
        with:
          repository: eswarchandravidyasagar/ai-fitness
          path: ai-fitness

      - name: Build ai-fitness
        run: |
          cd ai-fitness
          npm ci
          npm run build

      - name: Bundle ai-fitness at /ai-fitness
        run: |
          mkdir -p out/ai-fitness
          cp -r ai-fitness/out/* out/ai-fitness/
          touch out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
